# -----------------------------------------------------------
#  TUTORA – Configurazione applicazione
# -----------------------------------------------------------
#
# DAO_TYPE: seleziona la tecnologia di persistenza.
#
#   DB    → DbDaoFactory   (MySQL via JDBC, richiede db.properties)
#   DEMO  → DemoDaoFactory (in-memory, nessun DB necessario)
#   JSON  → JsonDaoFactory (file JSON su disco)
#
DAO_TYPE=DEMO

# -----------------------------------------------------------
#  Social Login – Google OAuth2
# -----------------------------------------------------------
#  Credenziali dalla Google Cloud Console:
#  https://console.cloud.google.com/apis/credentials
#  Tipo applicazione: "Desktop app"
#  Redirect URI autorizzato: http://localhost:8888/callback
#
GOOGLE_CLIENT_ID=
GOOGLE_CLIENT_SECRET=

# -----------------------------------------------------------
#  Social Login – Meta (Facebook) OAuth2
# -----------------------------------------------------------
#  Credenziali da Meta for Developers:
#  https://developers.facebook.com/apps
#  Redirect URI: http://localhost:8888/callback
#  Permessi: email, public_profile
#
META_APP_ID=
META_APP_SECRET=
